# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kapruka-ai-express
    runtime: node
    rootDir: backend-express
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_AGENT_URL
        value: https://kapruka-ai.onrender.com
      - key: FRONTEND_URL
        value: https://kapruka-ai-frontend.vercel.app
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: PYTHON_AGENT_TIMEOUT_MS
        value: "120000"
      - key: KAPRUKA_MCP_URL
        value: https://mcp.kapruka.com/mcp

  - type: web
    name: kapruka-ai-python
    runtime: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: KAPRUKA_MCP_URL
        value: https://mcp.kapruka.com/mcp
      - key: LLM_ENABLED
        value: "true"
